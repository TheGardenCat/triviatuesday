        body {

        .game-container {
            width: 100vw;

            flex-direction:column;
            justify-content: center;
            align-items:center;
            position:fixed;
            overflow:hidden;
        }

        .neon-card {
            width: 90%;
            max-width: 1400px;
            background: rgba(0, 0, 0, 0.75);

        @keyframes neonPulse {

            100% { box-shadow: 0 0 24px #ff44ff, 0 0 40px cyan; border-color: #ff44ff; }

        }

        @keyframes fastNeonFlash {
            0% { box-shadow: 0 0 30px #ff00cc, 0 0 45px #00e0ff; border-color: #ff00cc; }
            100% { box-shadow: 0 0 60px #ff44aa, 0 0 90px cyan; border-color: cyan; }

        .waiting-area {

        .answer-reveal {
            font-size: 2.5rem;

        .pencils-down-badge {

            border-radius: 40px;

        }

        .start-screen, .final-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            text-align: center;

 <!-- BACK IN GAME CONTAINER <div style="margin-top: 20px; font-size:1.2rem; color:#aaa;">✦ 60 second countdown ✦</div>-->

        { category: "Popular Books", question: "Who wrote 'Gone with the Wind'?", correctAnswer: "Margaret Mitchell", funFact: "Won Pulitzer Prize in 1937, one of best-selling novels." },
        { category: "Popular Books", question: "'The Joy Luck Club' explores mother-daughter relationships by?", correctAnswer: "Amy Tan", funFact: "Adapted into a touching film in 1993." },
        { category: "Popular Books", question: "Diana Gabaldon's time-travel series started with?", correctAnswer: "Outlander", funFact: "Hit TV series renewed multiple seasons." },
        { category: "Popular Books", question: "Which novel begins 'It is a truth universally acknowledged...'?", correctAnswer: "Pride and Prejudice", funFact: "Jane Austen's most celebrated romance." },
        { category: "Recipe Ingredient ID", question: "Which ingredient gives pesto its signature bright green color & herby punch?", correctAnswer: "Basil", funFact: "Traditional pesto alla genovese uses fresh basil, pine nuts, parmesan." },
        { category: "Recipe Ingredient ID", question: "What gives chocolate lava cake its gooey molten center?", correctAnswer: "Underbaked batter", funFact: "Molten center achieved by baking just until edges set." },

        { category: "Recipe Ingredient ID", question: "Which ingredient gives Caesar dressing its signature savory flavor?", correctAnswer: "Anchovies", funFact: "Anchovies add umami depth — even people who dislike them enjoy the flavor." },
        { category: "Recipe Ingredient ID", question: "Which acid is often added to guacamole to prevent browning?", correctAnswer: "Lime juice", funFact: "Lime adds flavor and vitamin C inhibits oxidation." },
        { category: "Recipe Ingredient ID", question: "Which cheese is the star of a classic tiramisu?", correctAnswer: "Mascarpone", funFact: "Italian double cream cheese, smooth and rich." },
        { category: "Recipe Ingredient ID", question: "What gives red velvet cake its signature color (two ingredients)?", correctAnswer: "Cocoa powder + buttermilk", funFact: "Natural cocoa reacts with acid giving reddish hue." },
        { category: "Are you smarter than an 8th Grader?", question: "What organelle is the 'powerhouse of the cell'?", correctAnswer: "Mitochondria", funFact: "Mitochondria generate ATP energy through respiration." },
        { category: "Are you smarter than an 8th Grader?", question: "What do we call a word that has the opposite meaning of another word?", correctAnswer: "Antonym", funFact: "‘Hot’ and ‘cold’ are one of the most common antonym pairs."},
        { category: "Are you smarter than an 8th Grader?", question: "Which amendment abolished slavery in the US?", correctAnswer: "13th", funFact: "Ratified in 1865 after Civil War." },
        { category: "Are you smarter than an 8th Grader?", question: "Who wrote 'The Tell-Tale Heart'?", correctAnswer: "Edgar Allan Poe", funFact: "Master of gothic horror, published 1843." },
        { category: "Are you smarter than an 8th Grader?", question: "What is the Pythagorean theorem formula?", correctAnswer: "a²+b²=c²", funFact: "Applies to right triangles, foundational geometry." },
        { category: "Are you smarter than an 8th Grader?", question: "Which war was fought between the North and South (US)?", correctAnswer: "Civil War", funFact: "1861-1865, pivotal in American history." },
        { category: "Are you smarter than an 8th Grader?", question: "Transport oxygen & nutrients is the main function of this system?", correctAnswer: "Circulatory", funFact: "Heart pumps blood through vessels." },
        { category: "Are you smarter than an 8th Grader?", question: "What is the square root of 144?", correctAnswer: "12", funFact: "12² = 144, basic math fact." },
        { category: "Are you smarter than an 8th Grader?", question: "In 'Romeo and Juliet', which family does Juliet belong to?", correctAnswer: "Capulet", funFact: "Star-crossed lovers from rival houses." },
        { category: "Are you smarter than an 8th Grader?", question: "Which planet is known as the 'Red Planet'?", correctAnswer: "Mars", funFact: "Iron oxide gives reddish appearance." }
    ];

    // ------------------- GLOBALS -------------------
    let currentQIndex = 0;
    let timerSeconds = 60;
    let timerIntervalId = null;
    let rockMusicInterval = null;
    let audioCtx = null;
    let currentBPM = 120;
    let stepCounter = 0;
    let musicActive = false;
    
    // Game state machine:
    // 'countdown' -> timer & music running, stop button enabled, reveal/next disabled
    // 'pencils_down' -> timer stopped, reveal button enabled, next disabled
    // 'answer_shown' -> answer revealed, next enabled, stop/reveal disabled
    let gameState = 'countdown'; 

    // DOM elements
    const startScreenDiv = document.getElementById('startScreen');
    const gameUIDiv = document.getElementById('gameUI');
    const finalScreenDiv = document.getElementById('finalScreen');
    const categoryLabel = document.getElementById('categoryLabel');
    const questionTextEl = document.getElementById('questionText');
    const progressIndicator = document.getElementById('progressIndicator');
    const timerDisplay = document.getElementById('timerDisplay');
    const waitingArea = document.getElementById('waitingArea');
    const revealArea = document.getElementById('revealArea');
    const correctAnswerDisplay = document.getElementById('correctAnswerDisplay');
    const funFactDisplay = document.getElementById('funFactDisplay');
    const neonBox = document.getElementById('neonBox');
    const stopBtn = document.getElementById('stopCountdownBtn');
    const revealBtn = document.getElementById('revealAnswerBtn');
    const nextBtn = document.getElementById('nextQuestionBtn');
    const startBtn = document.getElementById('startGameBtn');
    const restartFinalBtn = document.getElementById('restartFinalBtn');

    // ------------------- AUDIO ENGINE -------------------
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playPencilsDownSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(220, now + 0.5);
        gain.gain.setValueAtTime(0.45, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
        osc.start();
        osc.stop(now + 0.7);
        const bufferSize = 4096;
        const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
        noiseNode.onaudioprocess = function(e) { const output = e.outputBuffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) output[i] = (Math.random() * 2 - 1) * 0.25; };
        const noiseGain = audioCtx.createGain();
        noiseNode.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noiseGain.gain.setValueAtTime(0.35, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
        noiseNode.start && noiseNode.start(now);
        setTimeout(() => { try { noiseNode.disconnect(); } catch(e){} }, 500);
    }

    function stopRockMusic() {
        if (rockMusicInterval) { clearInterval(rockMusicInterval); rockMusicInterval = null; }
        musicActive = false;
    }

    function scheduleRockBeat() {
        if (!musicActive || !audioCtx || gameState !== 'countdown') return;
        const now = audioCtx.currentTime;
        const step = stepCounter % 8;
        if (step === 0 || step === 4) {
            const kick = audioCtx.createOscillator();
            const kickGain = audioCtx.createGain();
            kick.connect(kickGain);
            kickGain.connect(audioCtx.destination);
            kick.frequency.value = 80;
            kick.type = 'sine';
            kickGain.gain.setValueAtTime(0.45, now);
            kickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            kick.start(); kick.stop(now + 0.2);
        }
        if (step === 2 || step === 6) {
            const snare = audioCtx.createOscillator();
            const snareGain = audioCtx.createGain();
            snare.connect(snareGain);
            snareGain.connect(audioCtx.destination);
            snare.frequency.value = 180;
            snare.type = 'triangle';
            snareGain.gain.setValueAtTime(0.35, now);
            snareGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            snare.start(); snare.stop(now + 0.15);
        }
        if (step === 0 || step === 4) {
            const chord = audioCtx.createOscillator();
            const chordGain = audioCtx.createGain();
            chord.connect(chordGain);
            chordGain.connect(audioCtx.destination);
            chord.frequency.value = 196;
            chord.type = 'sawtooth';
            chordGain.gain.setValueAtTime(0.22, now);
            chordGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
            chord.start(); chord.stop(now + 0.25);
        }
        stepCounter++;
    }

    function startRockCountdown() {
        stopRockMusic();
        if (gameState !== 'countdown') return;
        musicActive = true;
        stepCounter = 0;
        const intervalMs = (60000 / currentBPM) / 2;
        rockMusicInterval = setInterval(() => { scheduleRockBeat(); }, intervalMs);
    }

    function updateRockTempo(secondsLeft) {
        if (gameState !== 'countdown') return;
        if (secondsLeft <= 3 && currentBPM !== 200) {
            currentBPM = 200;
            stopRockMusic();
            startRockCountdown();
            neonBox.classList.add('fast-flash');
        } else if (secondsLeft > 3 && currentBPM !== 120) {
            currentBPM = 120;
            stopRockMusic();
            startRockCountdown();
            neonBox.classList.remove('fast-flash');
        }
    }

    // ------------------- UI STATE MANAGEMENT -------------------
    function updateButtonStates() {
        if (gameState === 'countdown') {
            stopBtn.disabled = false;
            revealBtn.disabled = true;
            nextBtn.disabled = true;
        } else if (gameState === 'pencils_down') {
            stopBtn.disabled = true;
            revealBtn.disabled = false;
            nextBtn.disabled = true;
        } else if (gameState === 'answer_shown') {
            stopBtn.disabled = true;
            revealBtn.disabled = true;
            nextBtn.disabled = false;
        }
    }

    function stopTimerAndMusic() {
        if (timerIntervalId) { clearInterval(timerIntervalId); timerIntervalId = null; }
        stopRockMusic();
        musicActive = false;
    }

    // called by host "STOP COUNTDOWN" button
    function forcePencilsDown() {
        if (gameState !== 'countdown') return;
        // stop timer & music
        stopTimerAndMusic();
        // play sound
        playPencilsDownSound();
        // show reveal panel but without answer yet
        revealArea.classList.remove('hide');
        document.getElementById('pencilsDownBadge').innerHTML = "⏰ PENCILS DOWN! (Host stopped early) ⏰";
        correctAnswerDisplay.textContent = "";
        funFactDisplay.textContent = "🔒 Host, click SHOW ANSWER to reveal.";
        waitingArea.classList.add('hide');
        // change state
        gameState = 'pencils_down';
        updateButtonStates();
        neonBox.classList.add('fast-flash');
        setTimeout(() => neonBox.classList.remove('fast-flash'), 800);
    }

    // called when timer naturally expires
    async function handleTimerExpired() {
        if (gameState !== 'countdown') return;
        stopTimerAndMusic();
        playPencilsDownSound();
        revealArea.classList.remove('hide');
        document.getElementById('pencilsDownBadge').innerHTML = "⌛ TIME'S UP! PENCILS DOWN! ⌛";
        correctAnswerDisplay.textContent = "";
        funFactDisplay.textContent = "🎤 Host, click SHOW ANSWER to reveal.";
        waitingArea.classList.add('hide');
        gameState = 'pencils_down';
        updateButtonStates();
        neonBox.classList.add('fast-flash');
        setTimeout(() => neonBox.classList.remove('fast-flash'), 800);
    }

    // reveal answer and fun fact
    function revealAnswer() {
        if (gameState !== 'pencils_down') return;
        const q = QUESTIONS[currentQIndex];
        correctAnswerDisplay.innerHTML = `✅ CORRECT ANSWER: ${q.correctAnswer} ✅`;
        funFactDisplay.innerHTML = q.funFact;
        document.getElementById('pencilsDownBadge').innerHTML = "📢 ANSWER REVEALED 📢";
        gameState = 'answer_shown';
        updateButtonStates();
    }

    function goToNextQuestion() {
        if (gameState !== 'answer_shown') return;
        if (currentQIndex + 1 < QUESTIONS.length) {
            currentQIndex++;
            loadQuestion();
        } else {
            endGame();
        }
    }

    // Timer logic
    function startTimer() {
        if (timerIntervalId) clearInterval(timerIntervalId);
        timerSeconds = 60;
        updateTimerUI();
        timerIntervalId = setInterval(() => {
            if (gameState !== 'countdown') return;
            if (timerSeconds <= 1) {
                clearInterval(timerIntervalId);
                timerIntervalId = null;
                handleTimerExpired();
            } else {
                timerSeconds--;
                updateTimerUI();
                if (timerSeconds <= 3) {
                    updateRockTempo(timerSeconds);
                } else if (timerSeconds === 4) {
                    neonBox.classList.remove('fast-flash');
                    if (currentBPM !== 120) {
                        currentBPM = 120;
                        stopRockMusic();
                        if (gameState === 'countdown') startRockCountdown();
                    }
                }
            }
        }, 1000);
    }

    function updateTimerUI() { timerDisplay.textContent = timerSeconds; }

    function loadQuestion() {
        // Reset everything
        stopTimerAndMusic();
        gameState = 'countdown';
        // UI reset
        revealArea.classList.add('hide');
        waitingArea.classList.remove('hide');
        document.getElementById('pencilsDownBadge').innerHTML = "✏️ PENCILS DOWN! ✏️";
        correctAnswerDisplay.innerHTML = "";
        funFactDisplay.innerHTML = "";
        neonBox.classList.remove('fast-flash');
        // load new question data
        const q = QUESTIONS[currentQIndex];
        categoryLabel.textContent = q.category;
        questionTextEl.textContent = q.question;
        progressIndicator.textContent = `Question ${currentQIndex+1} of ${QUESTIONS.length}`;
        timerSeconds = 60;
        updateTimerUI();
        // reset audio tempo
        currentBPM = 120;
        // start fresh timer & music
        startTimer();
        startRockCountdown();
        updateButtonStates();
    }

    function endGame() {
        stopTimerAndMusic();
        gameUIDiv.classList.add('hide');
        finalScreenDiv.classList.remove('hide');
    }

    function startGameSession() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        currentQIndex = 0;
        startScreenDiv.classList.add('hide');
        finalScreenDiv.classList.add('hide');
        gameUIDiv.classList.remove('hide');
        loadQuestion();
    }

    function resetFullGame() {
        stopTimerAndMusic();
        startGameSession();
    }

    // Attach event listeners
    startBtn.onclick = () => { initAudio(); if(audioCtx) audioCtx.resume().then(()=> startGameSession()); else startGameSession(); };
    restartFinalBtn.onclick = () => { initAudio(); if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); resetFullGame(); };
    stopBtn.onclick = () => { forcePencilsDown(); };
    revealBtn.onclick = () => { revealAnswer(); };
    nextBtn.onclick = () => { goToNextQuestion(); };
    
    document.body.addEventListener('click', ()=> { if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); });
    console.log("Ready: Host-controlled trivia with robust state machine.");
</script>
</body>
</html>
